<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kingdom of Azzuria</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; max-width: 100vw; overflow-x: hidden; background: #1a1510; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const JSONBIN_KEY   = "$2a$10$3JtHn/gcoRd13EULKH3dGOjj0hzINO967yxNCfoEfLqvdXyEiJJxu";
    const JSONBIN_BIN   = "69ac98d3d0ea881f40fa3593";
    const POLL_INTERVAL = 30000;

    const SEASONS      = ["Spring","Summer","Autumn","Winter"];
    const CLASSES      = ["Nobles","Bureaucrats","Merchants","Industrialists","Church","Intellectuals","Rural Workers","Factory Workers"];
    const REGIONS      = ["Valdorenza","Montecastre","Colleverdi","Rocchevalle","Pietramonforte","Sestria","Castelfalco","Varazzino","Mombarcaro","Torremezzo","Fontaniglia","Rivoltasso","Verre","Cassinasco"];
    const CLASS_COLORS = ["#c9a84c","#7a9cc4","#6db87a","#c47a5a","#9b7fba","#c4a96b","#8fae7a","#a08060"];
    const REGION_SEATS = [25,24,12,19,24,11,20,10,9,16,10,12,7,5];
    const REGION_CAPITALS = [
      "Villasora","Mezzana","Pontarola","Lochiaro","Barlento","Ceranza","Scafona","Finento","Larpoulle","Vantoux","Fontaniglia","Rivoltasso","Verre","Cassinasco"
    ];
    const MINISTRIES = [
      { id:"pm",        title:"Prime Minister"  },
      { id:"interior",  title:"Interior"        },
      { id:"finance",   title:"Finance"         },
      { id:"war",       title:"War"             },
      { id:"church",    title:"Church Affairs"  },
      { id:"justice",   title:"Justice"         },
      { id:"foreign",   title:"Foreign Affairs" },
      { id:"education", title:"Education"       },
    ];

    const GOLD = "#c9a84c";
    const SOFT = "#b0a080";
    const DIM  = "#6a5a3a";
    const PAGE = {fontFamily:"Georgia,serif",minHeight:"100vh",background:"#1a1510",color:"#e8dcc8"};

    const INITIAL_DATA = [
      [ 4, 2, 6, 4, 5, 3, 5, 5, 5, 5, 2, 5, 4, 3],
      [ 8, 4, 4, 5, 3, 4, 3, 3, 4, 3, 3, 6, 3, 2],
      [ 4, 9, 3, 5, 2, 7, 3, 2, 2, 2, 6, 3, 2, 1],
      [ 6, 5, 1, 2, 1, 2, 2, 1, 2, 1, 4, 1, 1, 1],
      [ 2, 3, 6, 3, 5, 4, 5, 7, 5, 5, 3, 7, 9, 9],
      [ 3, 5, 2, 3, 2, 3, 2, 2, 2, 2, 3, 3, 2, 1],
      [ 1, 1, 6, 4, 8, 4, 6, 7, 6, 7, 5, 3, 7, 9],
      [ 2, 1, 2, 4, 4, 3, 4, 3, 4, 5, 4, 2, 2, 4],
    ];

    const getSeason = t => SEASONS[(t-1)%4];
    const getYear   = t => 1848 + Math.floor((t-1)/4);
    const litLevel  = (data, col) => {
      const score = (data[5][col]*3 + data[1][col] - data[4][col]*0.5 + 5) / 15;
      if (score < 0.75) return {label:"Low",    color:"#c47a5a", n:1};
      if (score < 1.35) return {label:"Average",color:"#c9a84c", n:2};
      return                   {label:"High",   color:"#6db87a", n:3};
    };
    const calcNatUnrest = ag => Math.min(10, ag.reduce((a,v)=>a+(v>=5?2:v>=3?1:0),0));
    const unrestInfo = u => {
      if (u<=1) return {label:"Calm",    color:"#6db87a"};
      if (u<=3) return {label:"Tense",   color:"#c9a84c"};
      if (u<=6) return {label:"Volatile",color:"#c47a5a"};
      return           {label:"Crisis",  color:"#c4605a"};
    };
    const agitPhase = s => {
      if (s<=2) return {label:"Content", color:"#6db87a"};
      if (s<=4) return {label:"Restless",color:"#c9a84c"};
      return           {label:"Agitated",color:"#c4605a"};
    };
    const calcPopularity = (cand, data, agitation, natUnrest) =>
      REGIONS.map((_,rIdx) => {
        let score = 0;
        const penalty = natUnrest >= 4 ? 2 : 0;
        (cand.laws||[]).forEach(law => (law.effects||[]).forEach(({classIdx,type}) => {
          const inf = data[classIdx][rIdx];
          if (type==="bonus") score += inf;
          if (type==="malus") score -= agitation[classIdx]>=5 ? inf : Math.floor(inf/2);
        }));
        (cand.actions||[]).forEach(act => { score += (act.bonuses[rIdx]||0) * litLevel(data,rIdx).n; });
        return Math.round(score) - penalty;
      });

    // ── Mini components ───────────────────────────────────────────

    function AgitDots({value}) {
      const ph = agitPhase(value);
      return (
        <div style={{display:"flex",gap:"2px",alignItems:"center"}}>
          {Array.from({length:6}).map((_,i)=>(
            <div key={i} style={{width:"7px",height:"7px",borderRadius:"2px",background:i<value?ph.color:"rgba(255,255,255,0.06)"}}/>
          ))}
          <span style={{fontSize:"8px",color:ph.color,marginLeft:"4px",letterSpacing:"1px"}}>{ph.label}</span>
        </div>
      );
    }

    function PopBar({score, color}) {
      const pct = Math.min(100, Math.max(0, 50+score*2));
      return (
        <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
          <div style={{flex:1,height:"4px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
            <div style={{width:pct+"%",height:"100%",background:color,borderRadius:"2px",transition:"width 0.3s"}}/>
          </div>
          <span style={{fontSize:"9px",color:score>=0?color:"#c4605a",minWidth:"26px",textAlign:"right"}}>{score>0?"+"+score:score}</span>
        </div>
      );
    }

    function InfBar({value, color}) {
      return (
        <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
          <div style={{flex:1,height:"3px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
            <div style={{width:(value*10)+"%",height:"100%",background:color,borderRadius:"2px"}}/>
          </div>
          <span style={{fontSize:"9px",color,minWidth:"16px",textAlign:"right"}}>{value}</span>
        </div>
      );
    }

    // ── Region Modal ──────────────────────────────────────────────

    function RegionModal({rIdx, candidates, data, agitation, natUnrest, onClose}) {
      const pops = (candidates||[]).map(c=>({c,score:calcPopularity(c,data,agitation,natUnrest)[rIdx]})).sort((a,b)=>b.score-a.score);
      const lit  = litLevel(data, rIdx);
      return (
        <div onClick={onClose} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"16px"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1e1a12",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"8px",padding:"24px",width:"100%",maxWidth:"420px",maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{marginBottom:"16px",paddingBottom:"14px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"4px"}}>Region</div>
              <div style={{fontSize:"22px",color:"#e8dcc8",letterSpacing:"2px",marginBottom:"5px"}}>{REGIONS[rIdx]}</div>
              <div style={{display:"flex",gap:"12px",flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:"9px",color:DIM}}>🏛 {REGION_CAPITALS[rIdx]}</span>
                <span style={{fontSize:"9px",color:DIM}}>🗳 {REGION_SEATS[rIdx]} seats</span>
                <span style={{fontSize:"8px",color:lit.color,border:"1px solid "+lit.color+"44",borderRadius:"3px",padding:"1px 6px",letterSpacing:"1px"}}>LIT {lit.label.toUpperCase()}</span>
              </div>
            </div>
            <div style={{marginBottom:"16px"}}>
              <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>Party Popularity</div>
              {pops.map(({c,score},i)=>(
                <div key={c.id} style={{marginBottom:"7px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"3px"}}>
                    {i===0&&<span style={{fontSize:"9px"}}>👑</span>}
                    <div style={{width:"6px",height:"6px",borderRadius:"50%",background:c.color,flexShrink:0}}/>
                    <span style={{fontSize:"10px",color:c.color}}>{c.name}</span>
                  </div>
                  <PopBar score={score} color={c.color}/>
                </div>
              ))}
            </div>
            <div style={{marginBottom:"16px"}}>
              <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>Class Influence</div>
              {CLASSES.map((cls,i)=>(
                <div key={cls} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}}>
                  <div style={{width:"6px",height:"6px",borderRadius:"2px",background:CLASS_COLORS[i],flexShrink:0}}/>
                  <span style={{fontSize:"9px",color:SOFT,width:"105px",flexShrink:0}}>{cls}</span>
                  <div style={{flex:1}}><InfBar value={data[i][rIdx]} color={CLASS_COLORS[i]}/></div>
                </div>
              ))}
            </div>
            <div>
              <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>Class Agitation</div>
              {CLASSES.map((cls,i)=>(
                <div key={cls} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}}>
                  <div style={{width:"6px",height:"6px",borderRadius:"2px",background:CLASS_COLORS[i],flexShrink:0}}/>
                  <span style={{fontSize:"9px",color:SOFT,width:"105px",flexShrink:0}}>{cls}</span>
                  <AgitDots value={agitation[i]}/>
                </div>
              ))}
            </div>
            <button onClick={onClose} style={{marginTop:"18px",width:"100%",padding:"9px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",borderRadius:"4px",background:"transparent",border:"1px solid rgba(255,255,255,0.1)",color:SOFT}}>Close</button>
          </div>
        </div>
      );
    }

    // ── HOME TAB ──────────────────────────────────────────────────

    function HomeTab({state, candidates, data, agitation, natUnrest, turn, senateHolder}) {
      const ur      = unrestInfo(natUnrest);
      const season  = getSeason(turn);
      const year    = getYear(turn);
      const govt    = state.government;
      const pm      = govt?.pm ? candidates.find(c=>c.id===govt.pm) : null;
      const senHold = candidates.find(c=>c.id===senateHolder);
      const totalPops = (candidates||[]).map(c=>({c,total:calcPopularity(c,data,agitation,natUnrest).reduce((a,b)=>a+b,0)})).sort((a,b)=>b.total-a.total);
      const agitSorted = CLASSES.map((cls,i)=>({cls,agit:agitation[i],color:CLASS_COLORS[i]})).sort((a,b)=>b.agit-a.agit);
      const recentLaws = [
        ...(candidates||[]).flatMap(c=>(c.laws||[]).map(l=>({...l,src:c.name,color:c.color}))),
        ...((govt?.decrees||[]).filter(d=>d.status==="passed").map(d=>({...d,src:"The Crown",color:"#9b7fba"}))),
      ].sort((a,b)=>(b.id||0)-(a.id||0)).slice(0,5);

      return (
        <div style={{padding:"28px 20px",maxWidth:"620px",margin:"0 auto"}}>
          {/* kingdom title */}
          <div style={{textAlign:"center",marginBottom:"28px"}}>
            <div style={{fontSize:"9px",letterSpacing:"7px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>Electoral Map</div>
            <div style={{fontSize:"30px",letterSpacing:"4px",color:"#e8dcc8",textTransform:"uppercase",lineHeight:1.1,marginBottom:"6px"}}>Kingdom of<br/>Azzuria</div>
            <div style={{fontSize:"12px",letterSpacing:"4px",color:GOLD,textTransform:"uppercase",marginBottom:"14px"}}>{season} {year} — Turn {turn}</div>
            <div style={{width:"70px",height:"1px",background:"linear-gradient(to right,transparent,"+GOLD+",transparent)",margin:"0 auto"}}/>
          </div>

          {/* unrest */}
          <div style={{padding:"16px 18px",marginBottom:"12px",background:"rgba(255,255,255,0.02)",border:"1px solid "+ur.color+"33",borderLeft:"3px solid "+ur.color,borderRadius:"6px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
              <span style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase"}}>National Unrest</span>
              <span style={{fontSize:"9px",color:ur.color,letterSpacing:"2px",border:"1px solid "+ur.color+"44",borderRadius:"3px",padding:"2px 8px"}}>{ur.label.toUpperCase()}</span>
            </div>
            <div style={{width:"100%",height:"6px",background:"rgba(255,255,255,0.06)",borderRadius:"3px",overflow:"hidden",marginBottom:"5px"}}>
              <div style={{width:(natUnrest*10)+"%",height:"100%",background:ur.color,borderRadius:"3px",transition:"width 0.4s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"8px",color:DIM}}>
              <span>Calm</span><span style={{color:ur.color,fontWeight:"bold"}}>{natUnrest} / 10</span><span>Crisis</span>
            </div>
          </div>

          {/* government */}
          <div style={{padding:"16px 18px",marginBottom:"12px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"6px"}}>
            <div style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"12px"}}>Government</div>
            {pm ? (
              <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:senHold?"10px":"0"}}>
                <span style={{fontSize:"16px"}}>👑</span>
                <div>
                  <div style={{fontSize:"9px",color:DIM,letterSpacing:"1px",marginBottom:"2px"}}>Prime Minister</div>
                  <div style={{fontSize:"15px",color:pm.color,letterSpacing:"2px"}}>{pm.name}</div>
                </div>
              </div>
            ) : (
              <div style={{fontSize:"10px",color:DIM,fontStyle:"italic"}}>No government formed</div>
            )}
            {senHold && (
              <div style={{display:"flex",alignItems:"center",gap:"8px",paddingTop:"10px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                <span style={{fontSize:"12px"}}>🏛️</span>
                <div>
                  <div style={{fontSize:"9px",color:DIM,letterSpacing:"1px",marginBottom:"2px"}}>Senate Majority</div>
                  <div style={{fontSize:"12px",color:senHold.color}}>{senHold.name}</div>
                </div>
              </div>
            )}
          </div>

          {/* party standing */}
          <div style={{padding:"16px 18px",marginBottom:"12px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"6px"}}>
            <div style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"12px"}}>Party Standing</div>
            <div style={{display:"flex",flexDirection:"column",gap:"9px"}}>
              {totalPops.map(({c,total},i)=>(
                <div key={c.id}>
                  <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"3px"}}>
                    {i===0&&<span style={{fontSize:"10px"}}>👑</span>}
                    <div style={{width:"8px",height:"8px",borderRadius:"50%",background:c.color,flexShrink:0}}/>
                    <span style={{fontSize:"11px",color:c.color,flex:1}}>{c.name}</span>
                    <span style={{fontSize:"10px",color:total>=0?c.color:"#c4605a"}}>{total>0?"+"+total:total}</span>
                  </div>
                  <PopBar score={Math.round(total/REGIONS.length)} color={c.color}/>
                </div>
              ))}
            </div>
          </div>

          {/* agitation summary */}
          <div style={{padding:"16px 18px",marginBottom:"12px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"6px"}}>
            <div style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"12px"}}>Class Agitation</div>
            <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
              {agitSorted.map(({cls,agit,color})=>(
                <div key={cls} style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <div style={{width:"7px",height:"7px",borderRadius:"2px",background:color,flexShrink:0}}/>
                  <span style={{fontSize:"10px",color:SOFT,width:"110px",flexShrink:0}}>{cls}</span>
                  <AgitDots value={agit}/>
                </div>
              ))}
            </div>
          </div>

          {/* recent laws */}
          {recentLaws.length>0 && (
            <div style={{padding:"16px 18px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"6px"}}>
              <div style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"10px"}}>Recent Legislation</div>
              {recentLaws.map((item,i)=>(
                <div key={item.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 0",borderBottom:i<recentLaws.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                  <div style={{width:"5px",height:"5px",borderRadius:"50%",background:item.color,flexShrink:0}}/>
                  <span style={{fontSize:"10px",color:"#e8dcc8",flex:1}}>{item.name}</span>
                  <span style={{fontSize:"8px",color:item.color,letterSpacing:"1px"}}>{item.src}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── REGIONS TAB ───────────────────────────────────────────────

    function RegionsTab({candidates, data, agitation, natUnrest}) {
      const [openRegion, setOpenRegion] = useState(null);
      return (
        <div style={{padding:"20px 16px",maxWidth:"620px",margin:"0 auto"}}>
          <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"14px",textAlign:"center"}}>Tap any region for details</div>
          <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
            {REGIONS.map((r,rIdx)=>{
              const ranked = (candidates||[]).map(c=>({c,score:calcPopularity(c,data,agitation,natUnrest)[rIdx]})).sort((a,b)=>b.score-a.score);
              const leader = ranked[0];
              const lc     = leader?.c.color||"rgba(255,255,255,0.1)";
              const lit    = litLevel(data,rIdx);
              return (
                <div key={r} onClick={()=>setOpenRegion(rIdx)} style={{padding:"11px 14px",cursor:"pointer",background:"rgba(255,255,255,0.02)",borderLeft:"3px solid "+lc,border:"1px solid "+lc+"18",borderLeft:"3px solid "+lc,borderRadius:"5px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"12px",color:"#e8dcc8",letterSpacing:"1px"}}>{r}</div>
                      <div style={{fontSize:"8px",color:DIM,marginTop:"1px"}}>🏛 {REGION_CAPITALS[rIdx]}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:"8px",color:DIM,marginBottom:"2px"}}>{REGION_SEATS[rIdx]} seats</div>
                      <span style={{fontSize:"8px",color:lit.color,border:"1px solid "+lit.color+"44",borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>{lit.label.toUpperCase()}</span>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
                    {ranked.map(({c,score},i)=>(
                      <span key={c.id} style={{fontSize:"9px",color:i===0?c.color:DIM}}>
                        {i===0?"👑 ":""}{c.name} <span style={{color:score>=0?c.color:"#c4605a"}}>{score>0?"+"+score:score}</span>
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          {openRegion!==null && <RegionModal rIdx={openRegion} candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest} onClose={()=>setOpenRegion(null)}/>}
        </div>
      );
    }

    // ── PARTIES TAB ───────────────────────────────────────────────

    function PartiesTab({candidates, data, agitation, natUnrest, senateHolder, government}) {
      return (
        <div style={{padding:"20px 16px",maxWidth:"620px",margin:"0 auto"}}>
          <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
            {(candidates||[]).map(cand=>{
              const pops     = calcPopularity(cand,data,agitation,natUnrest);
              const totalPop = pops.reduce((a,b)=>a+b,0);
              const isSenate = senateHolder===cand.id;
              const myMinistries = MINISTRIES.filter(m=>government?.[m.id]===cand.id);
              return (
                <div key={cand.id} style={{padding:"16px",background:"rgba(255,255,255,0.02)",border:"1px solid "+cand.color+"22",borderLeft:"3px solid "+cand.color,borderRadius:"6px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
                    <div style={{width:"10px",height:"10px",borderRadius:"50%",background:cand.color,flexShrink:0}}/>
                    <span style={{fontSize:"15px",color:cand.color,letterSpacing:"2px",flex:1}}>{cand.name}</span>
                    <span style={{fontSize:"10px",color:totalPop>=0?GOLD:"#c4605a"}}>Σ {totalPop>0?"+"+totalPop:totalPop}</span>
                  </div>
                  {(isSenate||myMinistries.length>0)&&(
                    <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"10px"}}>
                      {isSenate&&<span style={{fontSize:"8px",color:"#9b7fba",border:"1px solid rgba(155,127,186,0.4)",borderRadius:"3px",padding:"2px 7px",letterSpacing:"1px"}}>🏛 SENATE</span>}
                      {myMinistries.map(m=>(
                        <span key={m.id} style={{fontSize:"8px",color:GOLD,border:"1px solid rgba(201,168,76,0.3)",borderRadius:"3px",padding:"2px 7px",letterSpacing:"1px"}}>👑 {m.title.toUpperCase()}</span>
                      ))}
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 14px",marginBottom:(cand.laws||[]).length?"10px":"0"}}>
                    {REGIONS.map((r,i)=>(
                      <div key={r}>
                        <div style={{fontSize:"8px",color:SOFT,letterSpacing:"1px",marginBottom:"2px"}}>{r}</div>
                        <PopBar score={pops[i]} color={cand.color}/>
                      </div>
                    ))}
                  </div>
                  {(cand.laws||[]).length>0&&(
                    <div style={{paddingTop:"8px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                      <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"5px"}}>Laws</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                        {(cand.laws||[]).map(law=>(
                          <span key={law.id} style={{fontSize:"9px",padding:"2px 8px",borderRadius:"3px",background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.2)",color:GOLD}}>{law.name}</span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── LAWS TAB ──────────────────────────────────────────────────

    function LawsTab({candidates, government}) {
      const allLaws = [
        ...(candidates||[]).flatMap(c=>(c.laws||[]).map(l=>({...l,src:c.name,color:c.color}))),
        ...((government?.decrees||[]).filter(d=>d.status==="passed").map(d=>({...d,src:"The Crown",color:"#9b7fba",isDecree:true}))),
      ].sort((a,b)=>(b.id||0)-(a.id||0));

      if (!allLaws.length) return (
        <div style={{padding:"40px 20px",textAlign:"center",color:DIM,fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase"}}>No laws enacted yet</div>
      );

      return (
        <div style={{padding:"20px 16px",maxWidth:"620px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"7px"}}>
          {allLaws.map(item=>(
            <div key={item.id} style={{padding:"12px 14px",background:"rgba(255,255,255,0.015)",borderLeft:"3px solid "+item.color,border:"1px solid "+item.color+"18",borderLeft:"3px solid "+item.color,borderRadius:"4px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
                <div style={{width:"6px",height:"6px",borderRadius:"50%",background:item.color,flexShrink:0}}/>
                <span style={{fontSize:"11px",color:"#e8dcc8",flex:1}}>{item.name}</span>
                {item.isDecree&&<span style={{fontSize:"8px",color:"#9b7fba",border:"1px solid rgba(155,127,186,0.3)",borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>DECREE</span>}
                {item.region!==undefined&&item.region!=="all"&&<span style={{fontSize:"8px",color:DIM,border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",padding:"1px 5px"}}>{REGIONS[item.region]}</span>}
                <span style={{fontSize:"8px",color:item.color,letterSpacing:"1px",flexShrink:0}}>{item.src}</span>
              </div>
              {item.desc&&<div style={{fontSize:"9px",color:SOFT,fontStyle:"italic",marginBottom:"5px",paddingLeft:"14px"}}>{item.desc}</div>}
              <div style={{display:"flex",flexWrap:"wrap",gap:"3px",paddingLeft:"14px"}}>
                {(item.effects||[]).map(({classIdx,type})=>(
                  <span key={classIdx} style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",
                    background:type==="bonus"?"rgba(80,160,100,0.1)":"rgba(200,80,60,0.1)",
                    border:"1px solid "+(type==="bonus"?"rgba(80,160,100,0.25)":"rgba(200,80,60,0.25)"),
                    color:type==="bonus"?"#80c890":"#e08060"}}>
                    {type==="bonus"?"+":"−"} {CLASSES[classIdx]}
                  </span>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ── APP ───────────────────────────────────────────────────────

    function App() {
      const [state,   setState]   = useState(null);
      const [lastSync,setLastSync]= useState(null);
      const [error,   setError]   = useState(null);
      const [syncing, setSyncing] = useState(false);
      const [tab,     setTab]     = useState(0);

      const load = async () => {
        setSyncing(true);
        try {
          const res  = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest?t=${Date.now()}`,{headers:{"X-Access-Key":JSONBIN_KEY,"Cache-Control":"no-cache"},cache:"no-store"});
          const data = await res.json();
          if (data.record){setState(data.record);setLastSync(new Date());setError(null);}
          else setError("No game data found.");
        } catch(e){setError("Could not reach game server.");}
        setSyncing(false);
      };

      useEffect(()=>{load();const t=setInterval(load,POLL_INTERVAL);return()=>clearInterval(t);},[]);

      if (error&&!state) return (
        <div style={{...PAGE,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"12px",padding:"20px",minHeight:"100vh"}}>
          <div style={{fontSize:"10px",letterSpacing:"4px",color:"#c4605a",textTransform:"uppercase"}}>Connection Error</div>
          <div style={{fontSize:"12px",color:SOFT}}>{error}</div>
          <button onClick={load} style={{padding:"8px 20px",background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"4px",color:GOLD,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"11px",letterSpacing:"2px",textTransform:"uppercase"}}>Retry</button>
        </div>
      );

      if (!state) return (
        <div style={{...PAGE,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
          <div style={{fontSize:"10px",letterSpacing:"6px",color:DIM,textTransform:"uppercase"}}>Loading...</div>
        </div>
      );

      const {turn,agitation,candidates,senateHolder,government} = state;
      const data      = state.data||INITIAL_DATA.map(r=>[...r]);
      const natUnrest = calcNatUnrest(agitation);
      const TABS      = ["Home","Regions","Parties","Laws"];

      return (
        <div style={PAGE}>
          {/* sticky header + tabs */}
          <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(26,21,16,0.97)",backdropFilter:"blur(8px)",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{textAlign:"center",padding:"8px 16px 0",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",flexWrap:"wrap"}}>
              <span style={{fontSize:"11px",letterSpacing:"4px",color:GOLD,textTransform:"uppercase"}}>{getSeason(turn)} {getYear(turn)}</span>
              <span style={{fontSize:"8px",color:DIM,letterSpacing:"2px"}}>
                {syncing?"Syncing…":lastSync?"Updated "+lastSync.toLocaleTimeString():""}
              </span>
              <button onClick={load} style={{background:"none",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"3px",color:DIM,cursor:"pointer",fontSize:"10px",padding:"2px 8px",fontFamily:"Georgia,serif"}}>↻</button>
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:"2px",padding:"7px 12px"}}>
              {TABS.map((t,i)=>(
                <button key={i} onClick={()=>setTab(i)} style={{
                  padding:"7px 14px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",
                  letterSpacing:"2px",textTransform:"uppercase",borderRadius:"4px",
                  background:tab===i?"rgba(201,168,76,0.15)":"transparent",
                  border:"1px solid "+(tab===i?"rgba(201,168,76,0.45)":"rgba(255,255,255,0.07)"),
                  color:tab===i?GOLD:SOFT,
                }}>{t}</button>
              ))}
            </div>
          </div>

          {tab===0 && <HomeTab state={state} candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest} turn={turn} senateHolder={senateHolder}/>}
          {tab===1 && <RegionsTab candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest}/>}
          {tab===2 && <PartiesTab candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest} senateHolder={senateHolder} government={government}/>}
          {tab===3 && <LawsTab candidates={candidates} government={government}/>}

          <div style={{textAlign:"center",padding:"20px",fontSize:"8px",color:DIM,letterSpacing:"3px",textTransform:"uppercase",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
            Kingdom of Azzuria — Public Viewer — Auto-refreshes every 30s
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
